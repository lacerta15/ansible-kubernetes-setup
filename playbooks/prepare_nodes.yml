---
- name: Prepare nodes for Kubernetes
  hosts: k8s_cluster
  become: true
  tasks:
    - name: Disable swap
      command: swapoff -a
      changed_when: false
    - name: Remove swap from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].+swap.+)$'
        replace: '# \1'
    - name: Load kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop: [overlay, br_netfilter]
    - name: Persist kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: "overlay\nbr_netfilter\n"
    - name: Set sysctl for Kubernetes
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-kubernetes.conf
        reload: yes
      loop:
        - {name: net.bridge.bridge-nf-call-iptables,  value: "1"}
        - {name: net.bridge.bridge-nf-call-ip6tables, value: "1"}
        - {name: net.ipv4.ip_forward,                  value: "1"}
    - name: Disable SELinux (permissive for K8s)
      selinux:
        policy: targeted
        state: permissive
    - name: Disable firewalld (use kube-proxy instead)
      systemd:
        name: firewalld
        state: stopped
        enabled: no
      ignore_errors: yes
